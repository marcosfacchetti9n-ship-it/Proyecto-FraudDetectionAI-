[build]
  # Directorio donde están los archivos estáticos
  publish = "public"

  # Comando de build (no necesitamos build para archivos estáticos)
  command = "echo 'No build needed'"

[build.environment]
  # Variables de entorno para el frontend
  API_URL = "https://fraud-detection-api-jmx0.onrender.com"

# Redirecciones para SPA (Single Page Application)
[[redirects]]
  from = "/api/*"
  to = "https://fraud-detection-api-jmx0.onrender.com/:splat"
  status = 200

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"